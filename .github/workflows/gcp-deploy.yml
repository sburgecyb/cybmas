# Dev only: Cloud Build → Artifact Registry → Cloud Run (api, orchestrator, frontend).
# Embedding worker image + Cloud Run Job: optional — see cloudbuild.embedding-worker.yaml and deploy/README.md Phase 7.
#
# - Push to `main` or `master`: build and deploy to Dev.
# - workflow_dispatch: same pipeline (e.g. redeploy without a new commit).
#
# Secrets / Variables: deploy/README.md § CI/CD (Dev).

name: GCP build and deploy (Dev)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: gcp-deploy-dev-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGION: ${{ vars.GCP_REGION != '' && vars.GCP_REGION || 'us-central1' }}
  AR_REPO: ${{ vars.ARTIFACT_REGISTRY_REPO != '' && vars.ARTIFACT_REGISTRY_REPO || 'cybmas' }}

jobs:
  deploy-development:
    name: Build and deploy (Dev)
    # Use this GitHub Environment name if WIF / project vars live under Environments (not only repository secrets).
    environment: GCP_CICD
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Fails fast if repo secrets are missing (auth@v2 errors are vague when WIF is empty).
      - name: Check GCP auth secrets exist
        env:
          WIF: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          SA: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
        run: |
          echo "Repository for this run: ${{ github.repository }} (event: ${{ github.event_name }})"
          echo "Repository secrets apply only here. If this is a fork (your-user/cybmas), define secrets on the fork or push to the upstream repo where secrets exist."
          if [ -z "$WIF" ]; then
            echo "::error::GCP_WORKLOAD_IDENTITY_PROVIDER is empty in this run."
            echo "Fix: Add it under THIS repo → Settings → Secrets and variables → Actions → Secrets (not only on a fork parent)."
            echo "PRs from forks and some automated PRs do not receive secrets — merge via a branch on this repo or use Run workflow on the default branch."
            exit 1
          fi
          if [ -z "$SA" ]; then
            echo "::error::GCP_SERVICE_ACCOUNT_EMAIL is empty in this run."
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Image tag
        id: tag
        run: echo "tag=${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"

      - name: Cloud Build (images → Artifact Registry)
        run: |
          gcloud builds submit --config=cloudbuild.yaml \
            --project="${{ vars.GCP_PROJECT_DEV }}" \
            --substitutions=_TAG=${{ steps.tag.outputs.tag }},_REGION=${{ env.REGION }},_REPO=${{ env.AR_REPO }},_NEXT_PUBLIC_API_URL=${{ vars.DEV_API_GATEWAY_URL }} \
            .

      - name: Deploy Cloud Run (Dev)
        env:
          SVC_API: ${{ vars.CLOUD_RUN_SERVICE_API_DEV != '' && vars.CLOUD_RUN_SERVICE_API_DEV || 'cybmas-api' }}
          SVC_ORCH: ${{ vars.CLOUD_RUN_SERVICE_ORCH_DEV != '' && vars.CLOUD_RUN_SERVICE_ORCH_DEV || 'cybmas-orchestrator' }}
          SVC_FE: ${{ vars.CLOUD_RUN_SERVICE_FRONTEND_DEV != '' && vars.CLOUD_RUN_SERVICE_FRONTEND_DEV || 'cybmas-frontend' }}
          # When `true`, sets REDIS_DISABLED=true on api-gateway + orchestrator each deploy (no Memorystore).
          REDIS_DISABLED: ${{ vars.REDIS_DISABLED }}
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.tag }}"
          PROJ="${{ vars.GCP_PROJECT_DEV }}"
          REG="${{ env.REGION }}"
          REPO="${{ env.AR_REPO }}"
          deploy_one() {
            local svc="$1"
            local image_name="$2"
            local -a cmd=(
              gcloud run deploy "$svc"
              --image="${REG}-docker.pkg.dev/${PROJ}/${REPO}/${image_name}:${TAG}"
              --region="$REG"
              --platform=managed
              --project="$PROJ"
              --quiet
            )
            if { [ "$svc" = "$SVC_API" ] || [ "$svc" = "$SVC_ORCH" ]; } && [ "${REDIS_DISABLED:-}" = "true" ]; then
              cmd+=(--update-env-vars=REDIS_DISABLED=true)
            fi
            "${cmd[@]}"
          }
          deploy_one "$SVC_API" api-gateway
          deploy_one "$SVC_ORCH" orchestrator
          deploy_one "$SVC_FE" frontend
