# Dev only: Cloud Build → Artifact Registry → Cloud Run (api, orchestrator, frontend) +
# Cloud Run Job (cybmas-embedding-worker — JIRA → pgvector).
#
# - Push to `main` or `master`: build and deploy to Dev.
# - workflow_dispatch: same pipeline (e.g. redeploy without a new commit).
#
# Secrets / Variables: deploy/README.md § CI/CD (Dev).

name: GCP build and deploy (Dev)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: gcp-deploy-dev-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGION: ${{ vars.GCP_REGION != '' && vars.GCP_REGION || 'us-central1' }}
  AR_REPO: ${{ vars.ARTIFACT_REGISTRY_REPO != '' && vars.ARTIFACT_REGISTRY_REPO || 'cybmas' }}

jobs:
  deploy-development:
    name: Build and deploy (Dev)
    # Use this GitHub Environment name if WIF / project vars live under Environments (not only repository secrets).
    environment: GCP_CICD
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Fails fast if repo secrets are missing (auth@v2 errors are vague when WIF is empty).
      - name: Check GCP auth secrets exist
        env:
          WIF: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          SA: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
        run: |
          echo "Repository for this run: ${{ github.repository }} (event: ${{ github.event_name }})"
          echo "Repository secrets apply only here. If this is a fork (your-user/cybmas), define secrets on the fork or push to the upstream repo where secrets exist."
          if [ -z "$WIF" ]; then
            echo "::error::GCP_WORKLOAD_IDENTITY_PROVIDER is empty in this run."
            echo "Fix: Add it under THIS repo → Settings → Secrets and variables → Actions → Secrets (not only on a fork parent)."
            echo "PRs from forks and some automated PRs do not receive secrets — merge via a branch on this repo or use Run workflow on the default branch."
            exit 1
          fi
          if [ -z "$SA" ]; then
            echo "::error::GCP_SERVICE_ACCOUNT_EMAIL is empty in this run."
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Image tag
        id: tag
        run: echo "tag=${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"

      - name: Cloud Build (images → Artifact Registry)
        run: |
          gcloud builds submit --config=cloudbuild.yaml \
            --project="${{ vars.GCP_PROJECT_DEV }}" \
            --substitutions=_TAG=${{ steps.tag.outputs.tag }},_REGION=${{ env.REGION }},_REPO=${{ env.AR_REPO }},_NEXT_PUBLIC_API_URL=${{ vars.DEV_API_GATEWAY_URL }} \
            .

      - name: Deploy Cloud Run (Dev)
        env:
          SVC_API: ${{ vars.CLOUD_RUN_SERVICE_API_DEV != '' && vars.CLOUD_RUN_SERVICE_API_DEV || 'cybmas-api' }}
          SVC_ORCH: ${{ vars.CLOUD_RUN_SERVICE_ORCH_DEV != '' && vars.CLOUD_RUN_SERVICE_ORCH_DEV || 'cybmas-orchestrator' }}
          SVC_FE: ${{ vars.CLOUD_RUN_SERVICE_FRONTEND_DEV != '' && vars.CLOUD_RUN_SERVICE_FRONTEND_DEV || 'cybmas-frontend' }}
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.tag }}"
          PROJ="${{ vars.GCP_PROJECT_DEV }}"
          REG="${{ env.REGION }}"
          REPO="${{ env.AR_REPO }}"
          deploy_one() {
            local svc="$1"
            local image_name="$2"
            gcloud run deploy "$svc" \
              --image="${REG}-docker.pkg.dev/${PROJ}/${REPO}/${image_name}:${TAG}" \
              --region="$REG" \
              --platform=managed \
              --project="$PROJ" \
              --quiet
          }
          deploy_one "$SVC_API" api-gateway
          deploy_one "$SVC_ORCH" orchestrator
          deploy_one "$SVC_FE" frontend

      - name: Deploy Cloud Run Job (JIRA embedding worker)
        env:
          JOB_NAME: ${{ vars.CLOUD_RUN_JOB_EMBEDDING_DEV != '' && vars.CLOUD_RUN_JOB_EMBEDDING_DEV || 'cybmas-embedding-worker' }}
          BU_B1_PROJECTS: ${{ vars.BU_B1_PROJECTS }}
          BU_B2_PROJECTS: ${{ vars.BU_B2_PROJECTS }}
          JIRA_PROJECT_KEYS: ${{ vars.JIRA_PROJECT_KEYS }}
          DEFAULT_BUSINESS_UNIT: ${{ vars.DEFAULT_BUSINESS_UNIT }}
          JIRA_BASE_URL: ${{ vars.JIRA_BASE_URL }}
          GCP_CLOUDSQL_CONNECTION: ${{ vars.GCP_CLOUDSQL_CONNECTION }}
          EMBEDDING_JOB_VPC_CONNECTOR: ${{ vars.EMBEDDING_JOB_VPC_CONNECTOR }}
          GCP_RUN_JOB_SERVICE_ACCOUNT: ${{ vars.GCP_RUN_JOB_SERVICE_ACCOUNT }}
          INCIDENT_ISSUE_TYPES: ${{ vars.INCIDENT_ISSUE_TYPES }}
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.tag }}"
          PROJ="${{ vars.GCP_PROJECT_DEV }}"
          REG="${{ env.REGION }}"
          REPO="${{ env.AR_REPO }}"
          IMAGE="${REG}-docker.pkg.dev/${PROJ}/${REPO}/embedding-worker:${TAG}"

          if [ -z "${JIRA_BASE_URL:-}" ]; then
            echo "::error::Set GitHub variable JIRA_BASE_URL (e.g. https://yourorg.atlassian.net) so the embedding worker can call JIRA."
            exit 1
          fi

          cat > /tmp/embedding-worker-env.yaml <<EOF
          GCP_PROJECT_ID: "${PROJ}"
          VERTEX_AI_LOCATION: "${REG}"
          SYNC_MODE: "delta"
          GOOGLE_GENAI_USE_VERTEXAI: "true"
          JIRA_BASE_URL: "${JIRA_BASE_URL}"
          JIRA_PROJECT_KEYS: "${JIRA_PROJECT_KEYS:-}"
          DEFAULT_BUSINESS_UNIT: "${DEFAULT_BUSINESS_UNIT:-}"
          BU_B1_PROJECTS: "${BU_B1_PROJECTS:-}"
          BU_B2_PROJECTS: "${BU_B2_PROJECTS:-}"
          EOF

          if [ -n "${INCIDENT_ISSUE_TYPES:-}" ]; then
            printf 'INCIDENT_ISSUE_TYPES: "%s"\n' "${INCIDENT_ISSUE_TYPES}" >> /tmp/embedding-worker-env.yaml
          fi

          DEPLOY_ARGS=(
            gcloud run jobs deploy "${JOB_NAME}"
            --project="${PROJ}"
            --region="${REG}"
            --image="${IMAGE}"
            --tasks=1
            --max-retries=2
            --task-timeout=3600s
            --env-vars-file=/tmp/embedding-worker-env.yaml
            --set-secrets="DATABASE_URL=database_url:latest,REDIS_URL=redis_url:latest,JIRA_API_TOKEN=jira_api_token:latest,JIRA_USER_EMAIL=jira_user_email:latest"
            --quiet
          )

          if [ -n "${GCP_RUN_JOB_SERVICE_ACCOUNT:-}" ]; then
            DEPLOY_ARGS+=(--service-account="${GCP_RUN_JOB_SERVICE_ACCOUNT}")
          fi

          if [ -n "${GCP_CLOUDSQL_CONNECTION:-}" ]; then
            DEPLOY_ARGS+=(--add-cloudsql-instances="${GCP_CLOUDSQL_CONNECTION}")
          else
            echo "::warning::GCP_CLOUDSQL_CONNECTION is unset. If DATABASE_URL uses the Cloud SQL Unix socket, add repository variable GCP_CLOUDSQL_CONNECTION (PROJECT_ID:REGION:INSTANCE_ID)."
          fi

          if [ -n "${EMBEDDING_JOB_VPC_CONNECTOR:-}" ]; then
            DEPLOY_ARGS+=(--vpc-connector="${EMBEDDING_JOB_VPC_CONNECTOR}" --vpc-egress=private-ranges-only)
          else
            echo "::warning::EMBEDDING_JOB_VPC_CONNECTOR is unset. If REDIS_URL points to Memorystore, set it to your Serverless VPC Access connector (e.g. cybmas-redis-conn)."
          fi

          "${DEPLOY_ARGS[@]}"
