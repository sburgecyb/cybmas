# Reference only — Cloud Scheduler targets the Cloud Run Jobs REST API (:run), not an app URL.
# Use scripts/setup_embedding_scheduler.sh or setup_embedding_scheduler.ps1 (see deploy/README.md Phase 7).
#
# Example URI pattern:
#   https://REGION-run.googleapis.com/apis/run.googleapis.com/v1/namespaces/PROJECT_ID/locations/REGION/jobs/JOB_NAME:run
#
# Override SYNC_MODE per execution, e.g. full sync:
#   gcloud run jobs execute JOB_NAME --region=REGION --update-env-vars=SYNC_MODE=full --wait
jobs: []
